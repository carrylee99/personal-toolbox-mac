<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: file:; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>极速备忘</title>
    <link rel="stylesheet" href="./quick-memo.css" />
  </head>
  <body>
    <main class="quick-shell">
      <form id="quickMemoForm" class="quick-form">
        <label class="quick-field">
          <span class="quick-slogan">记录一下叭～</span>
          <textarea id="quickMemoInput" rows="3" aria-label="极速备忘"></textarea>
        </label>
        <p id="quickMemoStatus" class="quick-status" aria-live="polite" hidden></p>
      </form>
    </main>
    <script src="./quick-memo.js"></script>
  </body>
</html>
